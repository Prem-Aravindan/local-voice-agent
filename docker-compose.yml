version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      # Persist data directories on the host
      - ./data:/data
      - ./database:/database
      - ./logs:/logs
    environment:
      - DATABASE_URL=sqlite:////database/app.db
      - DATA_DIR=/data
      - LOGS_DIR=/logs
      - TTS_DEVICE=cpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_BASE=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
